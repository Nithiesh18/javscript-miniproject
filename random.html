<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random</title>
</head>
<body>
    <input type="number" id="num">
    <input type="button" value="Enter" onclick="randomnumber()">
    <div id="statement"></div>
    <h3 id="answer"></h3>

</body>
<script>
    
    let statement=document.getElementById("statement");
    let answer=document.getElementById("answer");

    function randomnumber(){
        let num=document.getElementById("num").value;
        let randomnum=Math.floor((Math.random()*10)+1);
        num=Number(num);

        if(randomnum==num){
            statement.innerHTML="<h2>🎉You won the game🎉</h2>";
        }
        else{
            statement.innerHTML="<h2>🤡You lost the game 🤡</h2> ";
            
        }
        answer.innerHTML=`The number is ${randomnum}`;
        
    }


</script>
</html>
